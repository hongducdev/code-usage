<!doctype html>
<html lang="vi" style="background:transparent">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Pet</title>
  <link rel="stylesheet" href="pet.css" />
</head>
<body style="background:transparent">
  <main id="petApp" class="pet-app" data-state="collapsed" data-mode="idle" data-provider="claude">
    <section id="activityBubble" class="activity-bubble" aria-label="Hoạt động agent" aria-live="polite" aria-hidden="true">
      <button id="bubbleButton" class="bubble-content" type="button" aria-label="Mở CodeUsage">
        <span class="bubble-logo"><img id="bubbleLogo" src="logos/codex.svg" alt="" /></span>
        <span class="bubble-copy">
          <span class="bubble-heading">
            <strong id="bubbleWorkspace">Agent</strong>
            <span id="bubbleStatus" class="bubble-status">Đang chạy</span>
          </span>
          <span id="bubbleMessage" class="bubble-message">Đang xử lý tác vụ</span>
          <span class="bubble-progress" aria-hidden="true"><i id="bubbleProgress"></i></span>
        </span>
      </button>
      <button id="dismissBubble" class="bubble-dismiss" type="button" aria-label="Ẩn thông báo">×</button>
    </section>

    <section class="compact" aria-label="Agent Pet">
      <button id="petButton" class="pet" type="button" aria-label="Hiện hoạt động agent" aria-expanded="false">
        <span class="claude-pet" aria-hidden="true">
          <svg viewBox="0 0 18 12" shape-rendering="crispEdges" fill="currentColor">
            <rect x="3" y="0" width="12" height="2.4"></rect><rect x="3" y="2.4" width="2" height="2.4"></rect><rect x="6" y="2.4" width="6" height="2.4"></rect><rect x="13" y="2.4" width="2" height="2.4"></rect><rect x="1" y="4.8" width="16" height="2.4"></rect><rect x="3" y="7.2" width="12" height="2.4"></rect><rect x="4" y="9.6" width="1" height="2.4"></rect><rect x="6" y="9.6" width="1" height="2.4"></rect><rect x="11" y="9.6" width="1" height="2.4"></rect><rect x="13" y="9.6" width="1" height="2.4"></rect>
          </svg>
        </span>
        <span class="approval-mark" aria-hidden="true">!</span>
        <span id="agentCount" class="agent-count" aria-label="0 agent đang chạy">0</span>
      </button>
    </section>
  </main>
  <script src="pet.js"></script>
</body>
</html>
